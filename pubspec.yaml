publish_to: "none"
version: 0.21.0+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  go_router: ^17.2.1
  drift: ^2.32.1
